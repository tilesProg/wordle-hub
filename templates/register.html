{% extends "base.html" %}
{% block title %}Register - Progle{% endblock %}
{% block content %}
<div class="container">
  <div style="max-width: 400px; margin: 3rem auto;">
    <div class="form-section">
      <h2 style="text-align: center; margin-bottom: 2rem;">Create Account</h2>
      
      <form method="post">
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" required autofocus>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required>
        </div>

        <button type="submit" style="width: 100%; margin-top: 1.5rem;">Create Account</button>
      </form>

      <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign in here</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
